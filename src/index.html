<!DOCTYPE html>

  <link rel="stylesheet" href="/styles/main.css">

      <!-- Config Callout -->
      <div id="config-callout" class="hidden">

           class="inline-flex items-center gap-3 text-black hover:opacity-80 transition-opacity">

      <div class="max-w-[948px] mt-5 md:mt-6">
        <h1 class="font-semibold text-[36px] md:text-[48px] lg:text-[64px] leading-[1.05] text-black tracking-[-0.01em]" data-content="hero.intro.text1"></h1>

      <div class="max-w-[400px] mt-5 md:mt-6 space-y-5 md:space-y-6">
        <p class="text-[18px] md:text-[20px] leading-[1.4] text-black" data-content="hero.intro.text2"></p>
        <a href="#" onclick="event.preventDefault(); Alpine.store('contactModal').openModal()" class="font-arial font-semibold text-[18px] md:text-[20px] leading-[1.3] text-black underline decoration-solid decoration-[1px] underline-offset-[3px] decoration-skip-ink-none hover:opacity-70 transition-opacity inline-block">Check availability</a>

    </div>

    <div id="talks-section" class="relative z-10">

    <div class="max-w-[1120px] w-full mx-auto px-6 md:px-10 pt-16 md:pt-24 pb-12">
      <div id="booking-content" class="text-center space-y-5"></div>
    </div>
    <div class="max-w-[1120px] w-full mx-auto px-6 md:px-10 pb-12">
      <div class="border-t border-white/20 pt-12"></div>
      <div id="footer-placeholder"></div>
    </div>
