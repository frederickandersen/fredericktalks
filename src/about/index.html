<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About — Frederick Andersen</title>
  <meta name="description" content="Frederick Andersen is a design studio founder and keynote speaker on AI design systems, UX strategy, and design engineering. Based in Copenhagen.">
  <link rel="stylesheet" href="/styles/main.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💬</text></svg>">
  <style>[x-cloak] { display: none !important; }</style>
</head>
<body class="bg-gray-50 text-black antialiased overflow-x-hidden">
  <div id="nav-placeholder"></div>

  <!-- Hero Photo -->
  <div class="max-w-container mx-auto px-6 md:px-10 pt-10 md:pt-16 pb-6 md:pb-8">
    <div class="image-placeholder bg-gray-200 rounded-md aspect-[16/9] w-full flex items-center justify-center">
      <span>Frederick Andersen — professional headshot or speaking at conference</span>
    </div>
  </div>

  <!-- Bio Section -->
  <div class="max-w-container mx-auto px-6 md:px-10 pb-12 md:pb-16">
    <div class="max-w-[680px] space-y-6 md:space-y-8">
      <h1 id="about-page-title" class="font-times text-[36px] md:text-[48px] leading-[1.2] text-black">About Frederick</h1>
      <div id="about-bio-content" class="space-y-5">
        <!-- Populated by JS -->
      </div>
    </div>
  </div>

  <!-- Photo Grid -->
  <div class="max-w-container mx-auto px-6 md:px-10 pb-12 md:pb-16">
    <div id="about-photo-grid" class="grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-6">
      <div class="image-placeholder bg-gray-200 rounded-md aspect-[4/3] flex items-center justify-center">
        <span>Frederick working at his desk at EDL studio</span>
      </div>
      <div class="image-placeholder bg-gray-200 rounded-md aspect-[4/3] flex items-center justify-center">
        <span>Frederick in conversation at a design conference</span>
      </div>
      <div class="image-placeholder bg-gray-200 rounded-md aspect-[4/3] flex items-center justify-center">
        <span>The EDL studio in Copenhagen</span>
      </div>
    </div>
  </div>

  <!-- Studio Section -->
  <div class="bg-white border-t border-gray-100 relative z-10">
    <div class="max-w-container mx-auto px-6 md:px-10 py-16 md:py-24">
      <div class="max-w-[680px] space-y-6 md:space-y-8">
        <h2 class="font-times text-[28px] md:text-[36px] leading-[1.2] text-black">EDL Studio</h2>
        <p id="about-studio-description" class="font-arial text-body md:text-[24px] leading-[1.3] text-black"></p>
        <a id="about-studio-link" href="https://edl.dk" target="_blank" rel="noopener noreferrer"
           class="inline-flex items-center font-arial font-medium text-[18px] md:text-[20px] text-primary-500 underline decoration-solid underline-offset-[3px] hover:text-primary-700 transition-colors">Visit edl.dk</a>
      </div>
    </div>
  </div>

  <!-- Speaking Philosophy -->
  <div class="bg-gray-50 relative z-10">
    <div class="max-w-container mx-auto px-6 md:px-10 py-16 md:py-24">
      <div class="max-w-[680px] space-y-6 md:space-y-8">
        <h2 class="font-times text-[28px] md:text-[36px] leading-[1.2] text-black">Speaking Philosophy</h2>
        <p id="about-philosophy" class="font-arial text-body md:text-[24px] leading-[1.3] text-black"></p>
      </div>
    </div>
  </div>

  <!-- Links -->
  <div class="bg-white border-t border-gray-100 relative z-10">
    <div class="max-w-container mx-auto px-6 md:px-10 py-12 md:py-16">
      <div class="flex flex-wrap gap-6 md:gap-8">
        <a href="https://www.linkedin.com/in/frederickjanandersen/" target="_blank" rel="noopener noreferrer"
           class="font-arial font-medium text-[18px] md:text-[20px] text-primary-500 underline decoration-solid underline-offset-[3px] hover:text-primary-700 transition-colors">LinkedIn</a>
        <a href="https://www.youtube.com/@frederickandersen/shorts" target="_blank" rel="noopener noreferrer"
           class="font-arial font-medium text-[18px] md:text-[20px] text-primary-500 underline decoration-solid underline-offset-[3px] hover:text-primary-700 transition-colors">YouTube</a>
        <a href="https://edl.dk" target="_blank" rel="noopener noreferrer"
           class="font-arial font-medium text-[18px] md:text-[20px] text-primary-500 underline decoration-solid underline-offset-[3px] hover:text-primary-700 transition-colors">Studio</a>
      </div>
    </div>
  </div>

  <!-- Booking CTA -->
  <div id="booking-section" class="bg-primary-500 relative z-10">
    <div class="max-w-container mx-auto px-6 md:px-10 py-16 md:py-24">
      <div id="booking-content" class="text-center space-y-6"></div>
    </div>
  </div>

  <div id="footer-placeholder"></div>
  <script type="module" src="/scripts/main.js"></script>
</body>
</html>
