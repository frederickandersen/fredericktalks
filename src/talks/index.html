<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Talks — Frederick Andersen</title>
  <meta name="description" content="Explore Frederick Andersen's talks on AI design systems, UX strategy, and design engineering. Available for conferences, workshops, and team sessions.">
  <link rel="stylesheet" href="/styles/main.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💬</text></svg>">
  <style>[x-cloak] { display: none !important; }</style>
</head>
<body class="bg-gray-50 text-black antialiased overflow-x-hidden">
  <div id="nav-placeholder"></div>

  <!-- Page Header -->
  <div class="max-w-container mx-auto px-6 md:px-10 pt-10 md:pt-16 pb-6 md:pb-8">
    <h1 id="talks-page-title" class="font-times text-[36px] md:text-[48px] leading-[1.2] text-black">Talks & Sessions</h1>
    <p id="talks-page-subtitle" class="font-arial text-body md:text-[24px] leading-[1.3] text-gray-500 mt-3 md:mt-4 max-w-content">Available for conferences, workshops, and team sessions globally.</p>
  </div>

  <!-- Speaking Photo -->
  <div class="max-w-container mx-auto px-6 md:px-10 pb-8 md:pb-12">
    <div class="image-placeholder bg-gray-200 rounded-md aspect-[16/7] w-full flex items-center justify-center">
      <span>Frederick presenting on stage at a design conference</span>
    </div>
  </div>

  <!-- All Talks -->
  <div class="max-w-container mx-auto px-6 md:px-10">
    <div id="talks-full-container">
      <!-- Populated by JS -->
    </div>
  </div>

  <!-- Booking CTA -->
  <div id="booking-section" class="bg-black relative z-10 mt-16">
    <div class="max-w-container mx-auto px-6 md:px-10 py-16 md:py-24">
      <div id="booking-content" class="text-center space-y-6"></div>
    </div>
  </div>

  <div class="bg-black relative z-10">
    <div class="max-w-[1120px] w-full mx-auto px-6 md:px-10 pb-12">
      <div class="border-t border-white/20 pt-12"></div>
      <div id="footer-placeholder"></div>
    </div>
  </div>
  <script type="module" src="/scripts/main.js"></script>
</body>
</html>
